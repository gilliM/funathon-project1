project:
  type: website
  render:
    - "index.qmd"
    - "subject/*.qmd"
website:
  title: "AIML4OS Funathon - Project 1"
  page-navigation: true
  description: "Predicting housing prices"
  site-url: "https://AIML4OS.github.io/funathon-project1/"
  repo-url: "https://github.com/AIML4OS/funathon-project1"
  repo-actions: [edit, issue]

  open-graph: true

  page-footer:
    right:
    - text: "License"
      href: LICENCE

  navbar:
    align: center
    title: false
    collapse-below: lg
 
    right:
      - icon: github
        href: "https://github.com/AIML4OS/funathon-project1"
        aria-label: GitHub

    left:
      - text: "0. Introduction"
        href: subject/introduction.qmd
      - text: "1. Data presentation"
        href: subject/1-intro_data.qmd
      - text: "2. Preprocessing"
        href: subject/2-preprocessing.qmd
      - text: "3. Modelling"
        menu:
        - text: "with a random forest"
          href: subject/3-RF_model.qmd
        - text: "with a gradient boosting"
          href: subject/3-GB_model.qmd
      - text: "4. Model evaluation"
        href: subject/4-metrics.qmd
      - text: "5. Model logging"
        href: subject/5-logging.qmd
      - text: "6. Deployment"
        href: subject/6-deployment.qmd


format:
  html:
    theme:
      light: [cosmo, custom.scss]
    toc: true
    reference-location: margin
    code-copy: true
    code-overflow: wrap
    grid:
      body-width: 1100px

execute: 
  eval: true
  cache: false
  warning: false
